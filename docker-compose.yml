services:
  tesla-apiscraper-rs:
    build: .
    container_name: tesla-apiscraper-rs
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      INFLUXDB_URL: http://influxdb:8181
      INFLUXDB_TOKEN: tesla-token
      INFLUXDB_DATABASE: tesla
    volumes:
      - sqlite-data:/data
    depends_on:
      influxdb:
        condition: service_healthy

  influxdb:
    image: quay.io/influxdb/influxdb3-core:latest
    container_name: tesla-apiscraper-influxdb
    restart: unless-stopped
    ports:
      - "8181:8181"
    command:
      - "serve"
      - "--node-id=teslamate"
      - "--object-store=file"
      - "--data-dir=/data"
      - "--without-auth"
    volumes:
      - influxdb-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  grafana:
    image: grafana/grafana:latest
    container_name: tesla-apiscraper-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  sqlite-data:
  influxdb-data:
  grafana-data:
