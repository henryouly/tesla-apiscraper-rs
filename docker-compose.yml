services:
  teslamate-rs:
    build: .
    container_name: teslamate-rs
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgres://teslamate:teslamate@postgres:5432/teslamate
    depends_on:
      postgres:
        condition: service_healthy
      grafana:
        condition: service_started

  postgres:
    image: timescale/timescaledb-ha:pg16-latest
    container_name: teslamate-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: teslamate
      POSTGRES_USER: teslamate
      POSTGRES_PASSWORD: teslamate
    volumes:
      - teslamate-pgdata:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teslamate -d teslamate"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  grafana:
    image: grafana/grafana:latest
    container_name: teslamate-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - teslamate-grafana-data:/var/lib/grafana

volumes:
  teslamate-pgdata:
  teslamate-grafana-data:
