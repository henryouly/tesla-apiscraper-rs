services:
  tesla-apiscraper-rs:
    build: .
    container_name: tesla-apiscraper-rs
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: sqlite:///data/tesla.db
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: tesla-token
      INFLUXDB_ORG: tesla
      INFLUXDB_BUCKET: tesla
    volumes:
      - sqlite-data:/data
    depends_on:
      influxdb:
        condition: service_healthy

  influxdb:
    image: influxdb:2
    container_name: tesla-apiscraper-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin123
      DOCKER_INFLUXDB_INIT_ORG: tesla
      DOCKER_INFLUXDB_INIT_BUCKET: tesla
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: tesla-token
    volumes:
      - influxdb-data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  grafana:
    image: grafana/grafana:latest
    container_name: tesla-apiscraper-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  sqlite-data:
  influxdb-data:
  grafana-data:
